<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Заметки (13-18)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Заметки — офлайн-приложение</h1>
    <div id="offline-banner">Нет соединения с интернетом. Работаем офлайн.</div>
    <form id="note-form">
      <input
        type="text"
        id="note-input"
        placeholder="Введите заметку"
        required
      />
      <button type="submit">Добавить</button>
    </form>
    <ul id="notes-list"></ul>
    <script src="app.js"></script>
  </body>
</html>
