<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3d5af1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Заметки" />
    <link rel="icon" href="icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <link rel="manifest" href="manifest.json" />
    <title>Заметки (13-18)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Заметки — офлайн-приложение</h1>
    <div id="offline-banner">Нет соединения с интернетом. Работаем офлайн.</div>
    <form id="note-form">
      <input
        type="text"
        id="note-input"
        placeholder="Введите заметку"
        required
      />
      <button type="submit">Добавить</button>
    </form>
    <ul id="notes-list"></ul>
    <script src="app.js"></script>
  </body>
</html>
