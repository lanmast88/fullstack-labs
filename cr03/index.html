<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#4285f4" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Заметки (13-18)</title>
    <link rel="stylesheet" href="https://unpkg.com/chota@latest" />
    <link rel="icon" href="icons/favicon.ico" sizes="16x16" type="image/ico" />
    <style>
      body {
        max-width: 720px;
        margin: 0 auto;
        padding: 0 1rem;
        background: #f8fafc;
        color: #1e293b;
      }
      header {
        text-align: center;
        padding: 2rem 0 0;
      }
      header h2 {
        margin-bottom: 1rem;
      }
      .tab {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.2rem !important;
        padding: 0.7rem 2rem;
        color: #64748b;
      }
      .tab.active {
        border-bottom: 2px solid #4285f4;
        color: #4285f4;
      }
      #note-form {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      #note-input {
        flex: 1;
      }
      .button.primary {
        background-color: #3b82f6 !important;
        color: #fff !important;
        white-space: nowrap;
      }
      .button.primary:hover {
        background-color: #2563eb !important;
      }
      footer {
        margin-top: 2rem;
        padding: 1rem 0;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h2>Заметки — офлайн-приложение</h2>
      <nav class="tabs is-center">
        <button id="home-btn" class="tab active col-6">Главная</button>
        <button id="about-btn" class="tab col-6">О приложении</button>
      </nav>
    </header>

    <!-- Основной контейнер для динамического контента -->
    <main id="app-content" class="container" style="margin-top: 2rem">
      <!-- Сюда будет загружаться контент -->
    </main>

    <footer class="is-center">
      <button id="enable-push" class="button success">
        Включить уведомления
      </button>
      <button id="disable-push" class="button error" style="display: none">
        Отключить уведомления
      </button>
    </footer>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
